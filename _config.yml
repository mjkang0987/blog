title: PIKAWORKS | BLOG
tagline: 경제·부동산·IT 인사이트를 전하는 블로그
description: 경제·부동산·IT 인사이트를 전하는 블로그
url: "https://blog.pikaworks.kr"
baseurl: ""

# ── SEO/구조화 데이터(jekyll-seo-tag) ───────────────
author:
  name: pikaworks
logo: /assets/logo.png
social:
  name: pikaworks blog
  links:
    - https://blog.pikaworks.kr
twitter:
  card: summary_large_image

# ── 공유 위젯 ───────────────────────────────────────
# 카카오톡 공유용 JavaScript 키(공개 키, 브라우저 노출 정상).
# 보안은 Kakao Developers → 플랫폼 → Web → 사이트 도메인(https://blog.pikaworks.kr) 등록으로 처리.
# 비워두면 카카오 버튼은 '링크 복사'로 폴백.
kakao_js_key: "f367b9cfa49ef8a2c488f352ccd36872"

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-polyglot
  # jekyll-sitemap 제거: polyglot 번역본을 인식하지 못해 기본언어만 색인됨.
  # 다국어 + hreflang 사이트맵은 /sitemap.xml 템플릿에서 직접 출력한다.

# ── 다국어(polyglot) ───────────────────────────────
# 표준 구성: 기본언어(ko)는 루트, en-US/ja 는 서브폴더(/en-US/, /ja/)
# (TODO) /ko 프리픽스는 파이프라인 검증 후 적용 검토
languages: ["ko", "en-US", "ja"]
default_lang: "ko"
exclude_from_localization: ["assets", "images", "css", "js", "CNAME", "robots.txt", "sitemap.xml", "llms.txt", ".nojekyll"]
parallel_localization: false

# 글 URL: /2026/06/22/제목/
permalink: /:year/:month/:day/:title/

# 시간대·미래 날짜 글 빌드 (21시 발행 글이 빌드 시각에 제외되지 않도록)
timezone: Asia/Seoul
future: true

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post

sass:
  sourcemap: never

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - plan.md
  - vendor
