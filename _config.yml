title: pikaworks blog
description: 경제·부동산 인사이트를 한국어·영어·일본어로 전하는 블로그
url: "https://blog.pikaworks.kr"
baseurl: ""

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-polyglot

# ── 다국어(polyglot) ───────────────────────────────
# 표준 구성: 기본언어(ko)는 루트, en-US/ja 는 서브폴더(/en-US/, /ja/)
# (TODO) /ko 프리픽스는 파이프라인 검증 후 적용 검토
languages: ["ko", "en-US", "ja"]
default_lang: "ko"
exclude_from_localization: ["assets", "images", "css", "js", "CNAME", "robots.txt", "sitemap.xml", ".nojekyll"]
parallel_localization: false

# 글 URL: /2026/06/22/제목/
permalink: /:year/:month/:day/:title/

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post

sass:
  sourcemap: never

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - plan.md
  - vendor
